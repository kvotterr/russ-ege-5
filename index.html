            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mode-btn {
            background: #eef2f8;
            border: none;
            padding: 10px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: #1e3a5f;
        }
        .mode-btn.active {
            background: #1e4a76;
            color: white;
        }
        .mode-btn:first-child.active { background: #2b5a3b; }
        .mode-btn:last-child.active { background: #9b2f5f; }
        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            padding: 1.2rem 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafd;
            padding: 10px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .score {
            background: #2c5282;
            color: white;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: 600;
        }
        .reset-score {
            background: #e2e8f0;
            border: none;
            padding: 5px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .question-area {
            margin: 16px 0;
        }
        .word-prompt {
            font-size: 1.6rem;
            font-weight: 700;
            text-align: center;
            background: #eef2ff;
            padding: 20px;
            border-radius: 2rem;
            margin-bottom: 20px;
            word-break: break-word;
        }
        .sentence {
            font-size: 1.1rem;
            line-height: 1.45;
            background: #fefcf5;
            padding: 18px;
            border-radius: 1.5rem;
            border-left: 6px solid #2c5282;
            margin-bottom: 20px;
        }
        .sentence strong {
            background: #ffe0b5;
            padding: 0 4px;
            border-radius: 12px;
            color: #b1510a;
        }
        .input-field {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            border: 2px solid #cbd5e1;
            border-radius: 60px;
            outline: none;
            margin-bottom: 16px;
        }
        .input-field:focus {
            border-color: #2c5282;
            box-shadow: 0 0 0 3px rgba(44,82,130,0.2);
        }
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 16px 0 12px;
        }
        button {
            border: none;
            padding: 10px 22px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            font-size: 0.9rem;
        }
        .btn-check {
            background: #2c5282;
            color: white;
        }
        .btn-next {
            background: #e9edf2;
            color: #1f3a5f;
        }
        .btn-difficult {
            background: #f3e8d2;
            color: #8b5a2b;
        }
        .feedback {
            padding: 12px 16px;
            border-radius: 28px;
            margin-top: 16px;
            background: #f1f5f9;
            border-left: 5px solid #94a3b8;
        }
        .feedback.correct {
            background: #e0f2e7;
            border-left-color: #2b7e3a;
            color: #14532d;
        }
        .feedback.wrong {
            background: #ffe9e9;
            border-left-color: #c53030;
            color: #9b2c2c;
        }
        .difficult-list-panel {
            margin-top: 28px;
            background: #f4f7fb;
            border-radius: 1.5rem;
            padding: 12px 16px;
        }
        .badge {
            background: #f0e1c0;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        @media (max-width: 550px) {
            .word-prompt { font-size: 1.3rem; }
            .sentence { font-size: 0.95rem; }
            .card { padding: 1rem; }
            button { padding: 8px 16px; }
        }

</head>

    // --------------------------------------------------------------
    // Логика работы (режимы, счёт, словарь) – полностью рабочая
    // --------------------------------------------------------------
    let currentMode = "pairs";
    let currentQuestion = null;
    let currentScore = 0;
    let currentAnswered = false;
    let currentCorrectAnswer = "";
    let currentPairObj = null;
    let difficultWords = JSON.parse(localStorage.getItem("difficultParonyms")) || [];

    const dynamicDiv = document.getElementById("dynamicContent");
    const scoreSpan = document.getElementById("scoreDisplay");
    const resetScoreBtn = document.getElementById("resetScoreBtn");
    const difficultContainer = document.getElementById("difficultListContainer");
    const clearDifficultBtn = document.getElementById("clearDifficultBtn");

    function saveDifficult() {
        localStorage.setItem("difficultParonyms", JSON.stringify(difficultWords));
        renderDifficultList();
    }
    function renderDifficultList() {
        difficultContainer.innerHTML = "";
        if (difficultWords.length === 0) {
            difficultContainer.innerHTML = "<span class='badge'>📭 Нет добавленных слов. Ошиблись в режиме 1? Нажмите «➕ в словарь»</span>";
            return;
        }
        difficultWords.forEach((word, idx) => {
            const chip = document.createElement("span");
            chip.className = "badge";
            chip.innerHTML = `${word} ✖️`;
            chip.onclick = () => { difficultWords.splice(idx,1); saveDifficult(); };
            difficultContainer.appendChild(chip);
        });
    }
    function updateScoreUI() { scoreSpan.innerText = `✅ правильно: ${currentScore}`; }
    function addToDifficult(word) {
        if (!difficultWords.includes(word)) {
            difficultWords.push(word);
            saveDifficult();
            showFeedback(`➕ "${word}" добавлен в словарь сложных`, "neutral");
        } else showFeedback(`⚠️ "${word}" уже есть`, "neutral");
    }
    function showFeedback(msg, type) {
        const fb = document.getElementById("dynamicFeedback");
        if (fb) { fb.className = `feedback ${type}`; fb.innerHTML = msg; }
    }
    function generatePairQuestion() {
        const randomPair = paronymPairsList[Math.floor(Math.random() * paronymPairsList.length)];
        const side = Math.random() < 0.5 ? "left" : "right";
        let promptWord, correctPartner;
        if (side === "left") { promptWord = randomPair.word1; correctPartner = randomPair.word2; }
        else { promptWord = randomPair.word2; correctPartner = randomPair.word1; }
        currentPairObj = { prompt: promptWord, correct: correctPartner };
        currentCorrectAnswer = correctPartner;
        currentAnswered = false;
        return { promptWord, correctPartner };
    }
    function renderPairsMode() {
        const { promptWord, correctPartner } = generatePairQuestion();
        const html = `
            <div class="question-area">
                <div class="word-prompt">❓ ${promptWord}</div>
                <input type="text" id="answerInput" class="input-field" placeholder="Введите пароним (например, этичный)" autocomplete="off">
                <div class="button-group">
                    <button id="checkBtn" class="btn-check">✔ Проверить</button>
                    <button id="nextBtn" class="btn-next">🎲 Следующее слово</button>
                    <button id="difficultWordBtn" class="btn-difficult">📚 Добавить в словарь</button>
                </div>
                <div id="dynamicFeedback" class="feedback neutral">✨ Напишите парное слово и нажмите «Проверить»</div>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        document.getElementById("checkBtn").onclick = () => {
            const ans = document.getElementById("answerInput").value.trim();
            const norm = s => s.toLowerCase().replace(/[.,!?;:()]/g, '');
            if (norm(ans) === norm(currentCorrectAnswer)) {
                if (!currentAnswered) { currentScore++; updateScoreUI(); currentAnswered=true; showFeedback(`✅ Верно! +1 балл.`, "correct"); }
                else showFeedback(`🎉 Уже верно!`, "correct");
            } else showFeedback(`❌ Неправильно. Правильный ответ: «${currentCorrectAnswer}».`, "wrong");
        };
        document.getElementById("nextBtn").onclick = () => renderPairsMode();
        document.getElementById("difficultWordBtn").onclick = () => addToDifficult(currentPairObj.prompt);
    }
    function renderSentencesMode() {
        const randomSent = sentencesDB[Math.floor(Math.random() * sentencesDB.length)];
        currentCorrectAnswer = randomSent.correct;
        currentAnswered = false;
        let displayText = randomSent.text;
        const wrongWord = randomSent.hintWord;
        if (wrongWord && displayText.includes(wrongWord)) {
            displayText = displayText.replace(wrongWord, `<strong style="background:#fee2e2; padding:0 6px; border-radius:12px;">${wrongWord}</strong>`);
        }
        const html = `
            <div class="question-area">
                <div class="sentence">📖 ${displayText}</div>
                <input type="text" id="sentenceAnswer" class="input-field" placeholder="Введите правильный пароним (исправьте ошибку)" autocomplete="off">
                <div class="button-group">
                    <button id="checkSentBtn" class="btn-check">✔ Проверить</button>
                    <button id="nextSentBtn" class="btn-next">🎲 Следующее предложение</button>
                </div>
                <div id="dynamicFeedback" class="feedback neutral">🔍 Вставьте верное слово (в нужной форме)</div>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        document.getElementById("checkSentBtn").onclick = () => {
            const ans = document.getElementById("sentenceAnswer").value.trim();
            const norm = s => s.toLowerCase().replace(/[.,!?;:()]/g, '');
            if (norm(ans) === norm(currentCorrectAnswer)) {
                if (!currentAnswered) { currentScore++; updateScoreUI(); currentAnswered=true; showFeedback(`✅ Абсолютно верно! +1 балл.`, "correct"); }
                else showFeedback(`Уже засчитано.`, "correct");
            } else showFeedback(`❌ Ошибка! Правильный ответ: «${currentCorrectAnswer}».`, "wrong");
        };
        document.getElementById("nextSentBtn").onclick = () => renderSentencesMode();
    }
    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll(".mode-btn").forEach(btn => {
            if (btn.dataset.mode === mode) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        if (mode === "pairs") renderPairsMode();
        else renderSentencesMode();
    }
    resetScoreBtn.onclick = () => { currentScore = 0; updateScoreUI(); showFeedback("Счёт обнулён", "neutral"); };
    clearDifficultBtn.onclick = () => { difficultWords = []; saveDifficult(); showFeedback("Словарь очищен", "neutral"); };
    document.querySelectorAll(".mode-btn").forEach(btn => btn.onclick = () => setMode(btn.dataset.mode));
    renderDifficultList();
    setMode("pairs");
</script>
